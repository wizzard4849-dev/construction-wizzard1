<meta charset="UTF-8"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Instrument Sans',sans-serif;background:#f0ede8;color:#1c1c1c;font-size:14px;line-height:1.5}
button,input,select,textarea{font-family:inherit}button{cursor:pointer}
:root{
--ink:#0c0c0c;--ink2:#181818;--ink3:#252525;--gold2:#f0b800;--gold:#d48a00;
--slate:#f0ede8;--white:#fff;--paper:#faf9f7;--border:#e0ddd6;--border2:#ccc9c0;
--text:#1c1c1c;--muted:#6a6560;--faint:#a8a39a;
--green:#1a7040;--gbg:#e8f5ee;--gbd:#b8dfc8;
--red:#a82020;--rbg:#fcecea;--rbd:#f0bdb5;
--blue:#1848a8;--bbg:#e8effe;
--amber:#b05800;--abg:#fef0e0;--abd:#f0d090;
--r:10px;--rlg:16px;--fh:'Syne',sans-serif;
--sh:0 2px 8px rgba(0,0,0,.08);--shlg:0 8px 32px rgba(0,0,0,.12);}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{height:52px;background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.tlogo{background:none;border:none;color:#fff;font-family:var(--fh);font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;cursor:pointer}
.badge{background:var(--gold2);color:var(--ink);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:800}
.tright{display:flex;align-items:center;gap:8px}
.tbtn{background:#2a2a2a;color:#aaa;border:none;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer}
.tbtn:hover{background:#383838;color:#fff}
#body{display:flex;flex:1;overflow:hidden}
#sidebar{width:210px;background:var(--ink2);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;padding-bottom:20px}
.ssec{padding:16px 14px 4px;font-size:9px;font-weight:700;letter-spacing:.14em;color:#444;text-transform:uppercase}
.si{display:flex;align-items:center;gap:8px;padding:8px 10px;margin:1px 6px;border-radius:7px;color:#777;font-size:12.5px;cursor:pointer;border:none;background:none;width:calc(100% - 12px);text-align:left}
.si:hover{background:#252525;color:#ccc}
.si.active{background:var(--ink3);color:#fff}
.si .ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sipro{margin-left:auto;background:#2a1800;color:var(--gold2);font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px}
.sb-foot{margin:auto 8px 8px;background:#1f1f1f;border-radius:9px;padding:12px;border:1px solid #2a2a2a}
.sb-name{font-size:12px;font-weight:600;color:#ddd;margin-bottom:2px}
.sb-plan{font-size:10px;color:var(--gold2);font-weight:700}
#main{flex:1;overflow-y:auto;background:var(--slate)}
.page{padding:24px;max-width:1180px;margin:0 auto}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.phl{display:flex;align-items:center;gap:12px}
.phico{width:46px;height:46px;background:var(--white);border:1px solid var(--border);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px}
.phtitle{font-family:var(--fh);font-size:19px;font-weight:800}
.phsub{font-size:12px;color:var(--muted);margin-top:1px}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--rlg);padding:20px;box-shadow:var(--sh);margin-bottom:16px}
.ch{font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:16px;margin-bottom:16px}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.sc{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.sv{font-size:22px;font-weight:800;font-family:var(--fh)}
.sl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.field{margin-bottom:13px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.inp{display:block;width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--border2);font-size:13px;background:var(--white);color:var(--text);outline:none}
.inp:focus{border-color:var(--gold2)}
textarea.inp{resize:vertical;min-height:76px}
.r2{display:flex;gap:11px}.r2 .field{flex:1}
.btn{padding:9px 18px;border-radius:8px;font-weight:700;font-size:13px;border:none;cursor:pointer}
.bink{background:var(--ink);color:#fff}
.bgold{background:var(--gold2);color:var(--ink)}
.bout{background:transparent;border:1px solid var(--border2);color:var(--text)}
.bred{background:var(--rbg);color:var(--red);border:1px solid var(--rbd)}
.bgreen{background:var(--gbg);color:var(--green);border:1px solid var(--gbd)}
.bfull{width:100%;padding:12px;display:block}.bsm{padding:5px 11px;font-size:11.5px}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700}
.pg{background:var(--gbg);color:var(--green)}.pr{background:var(--rbg);color:var(--red)}
.pa{background:var(--abg);color:var(--amber)}.pgr{background:#f0ede8;color:var(--muted)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:7px 10px;font-size:9.5px;font-weight:700;color:var(--faint);text-transform:uppercase;border-bottom:1px solid var(--border)}
.tbl td{padding:10px;border-bottom:.5px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border:none}.tbl tr:hover td{background:#faf8f4}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.pbar{height:5px;background:#eae7e0;border-radius:99px;overflow:hidden}
.pfill{height:100%;border-radius:99px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;pointer-events:none}
.toast.ok{background:#1a7040}.toast.err{background:#a82020}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.modal-box{background:var(--white);border-radius:var(--rlg);padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--ink);background-image:radial-gradient(circle,#ffffff07 1px,transparent 1px);background-size:22px 22px}
.auth-card{background:var(--white);border-radius:var(--rlg);padding:36px;width:100%;max-width:420px}
.atabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}
.atab{padding:9px;border:1px solid var(--border2);border-radius:7px;background:var(--white);font-size:13px;font-weight:600;color:var(--muted);cursor:pointer}
.atab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.aerr{background:var(--rbg);border:1px solid var(--rbd);border-radius:7px;padding:9px 12px;font-size:12px;color:var(--red);margin-bottom:12px}
.hero{background:var(--ink);padding:60px 28px 70px;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background-image:radial-gradient(circle,#ffffff08 1px,transparent 1px);background-size:24px 24px}
.hero-in{max-width:720px;margin:0 auto;position:relative;z-index:1}
.hero-eye{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold2);margin-bottom:14px}
.hero h1{font-family:var(--fh);font-size:44px;font-weight:800;color:#fff;line-height:1.1;margin-bottom:16px}
.hero h1 em{color:var(--gold2);font-style:normal}
.hero-sub{font-size:15px;color:#999;line-height:1.7;max-width:520px;margin-bottom:24px}
.hero-trial{background:rgba(240,184,0,.12);border:1px solid rgba(240,184,0,.3);border-radius:9px;padding:12px 18px;display:inline-flex;align-items:center;gap:10px;margin-bottom:22px;font-size:13px;color:var(--gold2)}
.hero-cta{background:var(--gold2);color:var(--ink);border:none;border-radius:9px;padding:13px 26px;font-weight:700;font-size:14px;cursor:pointer}
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.tc{background:var(--white);border:1px solid var(--border);border-radius:var(--rlg);padding:18px;cursor:pointer;text-align:left}
.tc:hover{box-shadow:var(--shlg)}
.tc-title{font-family:var(--fh);font-size:14px;font-weight:700;margin:8px 0 4px}
.tc-desc{font-size:11.5px;color:var(--muted);line-height:1.55}
.sstrip{background:var(--ink);padding:28px;display:flex;justify-content:center;gap:52px;flex-wrap:wrap}
.chkrow{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:.5px solid var(--border)}
.chkrow:last-child{border:none}
.chkrow input{accent-color:var(--gold2);width:14px;height:14px;flex-shrink:0;margin-top:2px}
.locked{background:var(--paper);border:1.5px dashed var(--border2);border-radius:var(--r);padding:44px 24px;text-align:center}
.banner{background:#fdf5e0;border:1px solid var(--abd);border-radius:9px;padding:10px 15px;font-size:12px;color:var(--amber);display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.trial-b{background:linear-gradient(135deg,#0a2a1a,#0f3d28);border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.proj-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
@media(max-width:768px){#sidebar{display:none}.page{padding:16px}.hero h1{font-size:30px}.g2,.g4{grid-template-columns:1fr}}

function gid(id) { return document.getElementById(id); }

function money(v, c) {
  return new Intl.NumberFormat('en-US', {style:'currency', currency: c || 'USD', maximumFractionDigits:0}).format(v);
}

function pill(s) {
  var map = {
    'Approved':'pg','Complete':'pg','Paid':'pg','Closed':'pg','Valid':'pg','Low':'pg',
    'Rejected':'pr','Overdue':'pr','High':'pr','Expired':'pr',
    'Pending':'pa','Open':'pa','Medium':'pa','Med':'pa','Expiring Soon':'pa',
    'Answered':'pg','Active':'pg'
  };
  return '<span class="pill ' + (map[s] || 'pgr') + '">' + s + '</span>';
}

function ph(ico, title, sub, act) {
  return '<div class="ph"><div class="phl"><div class="phico">' + ico + '</div><div><div class="phtitle">' + title + '</div><div class="phsub">' + (sub||'') + '</div></div></div><div>' + (act||'') + '</div></div>';
}

function srow(l, v) {
  return '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:9px"><span style="color:var(--muted)">' + l + '</span><strong>' + v + '</strong></div>';
}

function calcEst() {
  var e = EST;
  var b = e.sqft * e.csf;
  var d = b + e.mat + e.lab;
  var o = d * e.oh / 100;
  var p = (d + o) * e.pr / 100;
  EST_RES = {b:b, d:d, o:o, p:p, t:d+o+p};
}

function isPro() { return U && (U.plan === 'basic' || U.plan === 'pro'); }
function isTrial() { return U && U.plan === 'free_trial' && U.trialDays > 0; }
function hasAccess() { return isPro() || isTrial(); }

function gate(fn) {
  if (!hasAccess()) {
    return '<div class="locked"><div style="font-size:34px;margin-bottom:10px">🔒</div><div style="font-family:var(--fh);font-size:18px;font-weight:800;margin-bottom:6px">Pro Feature</div><p style="color:var(--muted);margin-bottom:18px">Upgrade to unlock this module.</p><button class="btn bgold" onclick="MODAL=true;render()">Upgrade to Pro</button></div>';
  }
  return fn();
}

function trialBar() {
  if (!U) return '';
  if (isTrial()) {
    return '<div class="trial-b"><div><div style="color:#4ade80;font-size:13px;font-weight:600">Free Trial Active - ' + U.trialDays + ' days remaining</div><div style="color:#86efac;font-size:11px;margin-top:2px">Upgrade before your trial ends.</div></div><button class="btn bgold bsm" onclick="MODAL=true;render()">Upgrade Now</button></div>';
  }
  if (!isPro()) {
    return '<div class="banner"><span>Upgrade to unlock all Pro features.</span><button class="btn bgold bsm" onclick="MODAL=true;render()">View Plans</button></div>';
  }
  return '';
}

function toast(msg, type) {
  var el = document.createElement('div');
  el.className = 'toast ' + (type || 'ok');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 3000);
}

// ── STORAGE ───────────────────────────────────────────────────────────────────
function ls_set(k, v) { try { localStorage.setItem('cw_' + k, JSON.stringify(v)); } catch(e) {} }
function ls_get(k, fb) { try { var d = localStorage.getItem('cw_' + k); return d ? JSON.parse(d) : fb; } catch(e) { return fb; } }

function initApp() {
  var u = ls_get('user', null);
  if (u) {
    if (u.plan === 'free_trial' && u.trialEnd) {
      u.trialDays = Math.max(0, Math.ceil((new Date(u.trialEnd) - new Date()) / 86400000));
      if (u.trialDays <= 0) u.plan = 'expired';
    }
    U = u;
  }
  SAVED = ls_get('projects', []);
  BIDS = ls_get('bids', BIDS);
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function doSignup(email, pw, name) {
  if (!email || !pw || !name) { AUTH_ERR = 'Please fill in all fields.'; return false; }
  if (pw.length < 6) { AUTH_ERR = 'Password must be at least 6 characters.'; return false; }
  var users = ls_get('users', []);
  var exists = false;
  for (var i = 0; i < users.length; i++) { if (users[i].email === email) { exists = true; break; } }
  if (exists) { AUTH_ERR = 'Email already registered.'; return false; }
  var trialEnd = new Date();
  trialEnd.setDate(trialEnd.getDate() + 7);
  var user = {id: 'u' + Date.now(), email: email, name: name, plan: 'free_trial', trialEnd: trialEnd.toISOString(), trialDays: 7};
  var saved = JSON.parse(JSON.stringify(user));
  saved.pw = pw;
  users.push(saved);
  ls_set('users', users);
  U = user;
  ls_set('user', U);
  AUTH_ERR = '';
  sendEmail(user);
  return true;
}

function doSignin(email, pw) {
  if (!email || !pw) { AUTH_ERR = 'Please enter email and password.'; return false; }
  var users = ls_get('users', []);
  var user = null;
  for (var i = 0; i < users.length; i++) {
    if (users[i].email === email && users[i].pw === pw) { user = users[i]; break; }
  }
  if (!user) { AUTH_ERR = 'Incorrect email or password.'; return false; }
  if (user.plan === 'free_trial' && user.trialEnd) {
    user.trialDays = Math.max(0, Math.ceil((new Date(user.trialEnd) - new Date()) / 86400000));
    if (user.trialDays <= 0) user.plan = 'expired';
  }
  U = user;
  ls_set('user', U);
  AUTH_ERR = '';
  return true;
}

function doSignout() { U = null; PAGE = 'home'; render(); }

function sendEmail(user) {
  try {
    if (typeof emailjs !== 'undefined') {
      emailjs.init({publicKey: 'Da113FA7sH9X1lUEe'});
      emailjs.send('service_nzakyyb', 'template_kqwspj8', {
        user_name: user.name,
        user_email: user.email,
        plan: 'Free Trial',
        signup_time: new Date().toLocaleString(),
        site_url: 'https://constructionwizzard.com'
      });
    }
  } catch(e) {}
}

// ── ESTIMATES ─────────────────────────────────────────────────────────────────
function saveEst() {
  calcEst();
  var proj = {
    id: 'p' + Date.now(),
    name: EST.pn, client: EST.cn,
    trade: TRADES[EST.trade] ? TRADES[EST.trade].l : EST.trade,
    total: EST_RES.t, currency: EST.currency,
    date: new Date().toLocaleDateString(),
    est: JSON.parse(JSON.stringify(EST)),
    res: JSON.parse(JSON.stringify(EST_RES))
  };
  SAVED.unshift(proj);
  ls_set('projects', SAVED);
  toast('Estimate saved!');
  render();
}

function loadEst(id) {
  for (var i = 0; i < SAVED.length; i++) {
    if (SAVED[i].id === id) {
      EST = JSON.parse(JSON.stringify(SAVED[i].est));
      EST_RES = JSON.parse(JSON.stringify(SAVED[i].res));
      PAGE = 'estimator';
      toast('Estimate loaded!');
      render();
      return;
    }
  }
}

function delEst(id) {
  SAVED = SAVED.filter(function(p) { return p.id !== id; });
  ls_set('projects', SAVED);
  toast('Deleted.', 'err');
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function go(p) { PAGE = p; render(); }

function render() {
  var el = gid('app');
  if (!el) return;

  if (!U && PAGE !== 'home') { el.innerHTML = authPage(); bindAuth(); return; }
  if (PAGE === 'home' && !U) { el.innerHTML = heroPage() + (MODAL ? modalHTML() : ''); bindHero(); if (MODAL) bindModal(); return; }

  el.innerHTML = appShell();
  bindAll();
}

function appShell() {
  return '<div id="app" style="display:flex;flex-direction:column;height:100vh;overflow:hidden">' +
    topbarHTML() +
    '<div id="body" style="display:flex;flex:1;overflow:hidden">' +
    sidebarHTML() +
    '<div id="main" style="flex:1;overflow-y:auto;background:var(--slate)">' +
    '<div class="page">' + pageContent() + '</div>' +
    '</div></div></div>' +
    (MODAL ? modalHTML() : '');
}

function topbarHTML() {
  var plan = U ? (U.plan || '') : '';
  var badge = '';
  if (plan === 'pro') badge = '<span style="background:linear-gradient(135deg,#d48a00,#f0b800);color:var(--ink);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:800">PRO</span>';
  else if (plan === 'basic') badge = '<span style="background:#1848a8;color:#fff;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:800">BASIC</span>';
  else if (isTrial()) badge = '<span style="background:#1a7040;color:#fff;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700">TRIAL ' + U.trialDays + 'd</span>';
  else badge = '<button class="btn bgold bsm" id="topUpgrade">Upgrade</button>';
  return '<div id="topbar"><button class="tlogo" onclick="go(\'home\')">⬡ <span class="badge">Wizzard</span></button><div class="tright">' + badge + '<div style="width:28px;height:28px;border-radius:50%;background:var(--gold2);color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800">' + (U ? U.name.charAt(0).toUpperCase() : 'G') + '</div><button class="tbtn" id="topOut">Sign Out</button></div></div>';
}

function sidebarHTML() {
  var html = '<div id="sidebar">';
  for (var i = 0; i < NAV.length; i++) {
    var sec = NAV[i];
    html += '<div class="ssec">' + sec.s + '</div>';
    for (var j = 0; j < sec.items.length; j++) {
      var it = sec.items[j];
      html += '<button class="si' + (PAGE === it.id ? ' active' : '') + '" onclick="go(\'' + it.id + '\')">';
      html += '<span class="ico">' + it.i + '</span>' + it.l;
      if (it.pro && !hasAccess()) html += '<span class="sipro">PRO</span>';
      html += '</button>';
    }
  }
  var planLabel = U ? (U.plan === 'free_trial' ? 'FREE TRIAL ' + (U.trialDays || 0) + 'd left' : U.plan.toUpperCase()) : '';
  html += '<div class="sb-foot"><div class="sb-name">' + (U ? U.name : '') + '</div><div class="sb-plan">' + planLabel + '</div>';
  if (!isPro()) html += '<button class="btn bgold bfull" style="margin-top:8px;padding:8px" onclick="go(\'settings\')">Upgrade Plan</button>';
  html += '</div></div>';
  return html;
}

function pageContent() {
  if (PAGE === 'home') return dashPage();
  if (PAGE === 'estimator') return estimPage();
  if (PAGE === 'projects') return projectsPage();
  if (PAGE === 'bidtender') return bidPage();
  if (PAGE === 'invoice') return invoicePage();
  if (PAGE === 'dailylog') return dailyLogPage();
  if (PAGE === 'punchlist') return punchPage();
  if (PAGE === 'schedule') return schedulePage();

  if (PAGE === 'changes') return gate(changesPage);
  if (PAGE === 'safety') return safetyPage();
  if (PAGE === 'incidents') return incidentsPage();
  if (PAGE === 'training') return trainingPage();
  if (PAGE === 'certexpiry') return certExpiryPage();
  if (PAGE === 'ai') return gate(aiPage);
  if (PAGE === 'blueprint') return gate(blueprintPage);
  if (PAGE === 'weather') return weatherPage();
  if (PAGE === 'materials') return materialsPage();
  if (PAGE === 'rfi') return rfiPage();
  if (PAGE === 'clientportal') return gate(clientPortalPage);

}

      if (val.toLowerCase().indexOf(keys[i]) >= 0) { found = keys[i]; break; }

function saveRFIResp(id) {
  var inp = gid('rr_' + id);
  if (!inp || !inp.value) return;
  for (var i = 0; i < RFIS.length; i++) {
    if (RFIS[i].id === id) { RFIS[i].resp = inp.value; RFIS[i].s = 'Answered'; break; }
  }
  toast('Response saved!');
  render();
}

function markRFIAnswered(id) {
  for (var i = 0; i < RFIS.length; i++) {
    if (RFIS[i].id === id) { RFIS[i].s = 'Answered'; break; }
  }
  toast('RFI marked as answered!');
  render();
}

  el = gid('topUpgrade'); if (el) el.onclick = function() { MODAL = true; render(); };

  // Modal
  el = gid('modalBg'); if (el) el.onclick = function(e) { if (e.target === gid('modalBg')) { MODAL = false; render(); } };
  el = gid('closeModal'); if (el) el.onclick = function() { MODAL = false; render(); };

  // Estimator
  el = gid('calcBtn'); if (el) el.onclick = function() {
    var v;
    v = gid('epn'); if (v) EST.pn = v.value;
    v = gid('ecn'); if (v) EST.cn = v.value;
    v = gid('ecur'); if (v) EST.currency = v.value;
    v = gid('etr'); if (v) { EST.trade = v.value; if (TRADES[v.value]) EST.csf = TRADES[v.value].c; }
    v = gid('esf'); if (v) EST.sqft = parseFloat(v.value) || 0;
    v = gid('ecsf'); if (v) EST.csf = parseFloat(v.value) || 0;
    v = gid('emat'); if (v) EST.mat = parseFloat(v.value) || 0;
    v = gid('elab'); if (v) EST.lab = parseFloat(v.value) || 0;
    v = gid('eoh'); if (v) EST.oh = parseFloat(v.value) || 0;
    v = gid('epr'); if (v) EST.pr = parseFloat(v.value) || 0;
    calcEst(); render();
  };
  el = gid('saveEstBtn'); if (el) el.onclick = saveEst;
  el = gid('saveEstBtn2'); if (el) el.onclick = saveEst;

  // Bids
  el = gid('toggleBF'); if (el) el.onclick = function() { SHOW_BF = !SHOW_BF; render(); };
  el = gid('addBidBtn'); if (el) el.onclick = function() {
    var p = gid('nbp') ? gid('nbp').value : '';
    var c = gid('nbc') ? gid('nbc').value : '';
    var v = gid('nbv') ? gid('nbv').value : '';
    var t = gid('nbt') ? gid('nbt').value : '';
    if (!p || !c || !v) { toast('Fill in all fields', 'err'); return; }
    BIDS.unshift({id: Date.now(), p:p, c:c, v:+v, s:'Pending', t:t});
    ls_set('bids', BIDS);
    SHOW_BF = false;
    render();
    toast('Bid added!');
  };

  // Daily log
  el = gid('showLF'); if (el) el.onclick = function() { SHOW_LF = !SHOW_LF; render(); };
  el = gid('submitLog'); if (el) el.onclick = function() {
    var d = gid('ld') ? gid('ld').value : '';
    if (!d) { toast('Select a date', 'err'); return; }
    LOGS.unshift({id:Date.now(), date:d, weather: gid('lw') ? gid('lw').value : 'Clear', crew: +(gid('lc') ? gid('lc').value : 0), notes: gid('ln') ? gid('ln').value : '', photos:0});
    SHOW_LF = false;
    render();
    toast('Log saved!');
  };

  // Safety
  var checks = document.querySelectorAll('[data-sc]');
  for (var i = 0; i < checks.length; i++) {
    (function(inp) {
      inp.onchange = function() { SC_CHECKED[inp.dataset.sc] = inp.checked; render(); };
    })(checks[i]);
  }
  el = gid('scNote'); if (el) el.oninput = function() { SC_NOTE = this.value; };
  el = gid('scSubmit'); if (el) el.onclick = function() {
    var done = 0;
    for (var k in SC_CHECKED) if (SC_CHECKED[k]) done++;
    if (done < SAFETY_ITEMS.length) { toast('Complete all items first', 'err'); return; }
    SC_DONE = true; render(); toast('Safety report submitted!');
  };

  // Cert expiry
  el = gid('sendAllAlerts'); if (el) el.onclick = function() {
    var ex = 0, sn = 0;
    for (var i = 0; i < CERTS.length; i++) {
      if (CERTS[i].status === 'Expired') ex++;
      if (CERTS[i].status === 'Expiring Soon') sn++;
    }
    toast('Alerts sent - ' + ex + ' expired, ' + sn + ' expiring soon!');
  };

  // AI
  el = gid('aiSend'); if (el) el.onclick = sendAI;
  el = gid('aiIn'); if (el) el.onkeydown = function(e) { if (e.key === 'Enter') sendAI(); };
  var aips = document.querySelectorAll('[data-aip]');
  for (var i = 0; i < aips.length; i++) {
    (function(btn) {
      btn.onclick = function() { var inp = gid('aiIn'); if (inp) inp.value = btn.dataset.aip; };
    })(aips[i]);
  }

  // Blueprint
  el = gid('bpFile'); if (el) el.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    BP_LOADING = true; BP_RESULT = null; render();
    setTimeout(function() {
      BP_LOADING = false;
      BP_RESULT = {
        rooms: 8, sqft: 7102,
        estimates: [
          {trade:'Drywall',rate:2.50,total:Math.round(7102*2.50)},
          {trade:'Electrical',rate:7.50,total:Math.round(7102*7.50)},
          {trade:'Plumbing',rate:6.75,total:Math.round(7102*6.75)},
          {trade:'HVAC',rate:8.50,total:Math.round(7102*8.50)},
          {trade:'Flooring',rate:4.25,total:Math.round(7102*4.25)}
        ],
        total: Math.round(7102 * (2.50+7.50+6.75+8.50+4.25))
      };
      render();
      toast('Blueprint analyzed! 8 rooms detected.');
    }, 2500);
  };
  el = gid('loadBpEst'); if (el) el.onclick = function() {
    if (BP_RESULT) { EST.sqft = BP_RESULT.sqft; PAGE = 'estimator'; render(); toast('Loaded into estimator!'); }
  };

  // Materials
  el = gid('matSearch'); if (el) el.oninput = function() { MAT_SEARCH = this.value; render(); };

  // RFI
  el = gid('showRFIForm'); if (el) el.onclick = function() { SHOW_RFI_FORM = !SHOW_RFI_FORM; render(); };
  el = gid('submitRFI'); if (el) el.onclick = function() {
    var sub = gid('rfiSub') ? gid('rfiSub').value : '';
    var from = gid('rfiFrom') ? gid('rfiFrom').value : '';
    var to = gid('rfiTo') ? gid('rfiTo').value : '';
    var due = gid('rfiDue') ? gid('rfiDue').value : 'TBD';
    var pri = gid('rfiPri') ? gid('rfiPri').value : 'Medium';
    if (!sub || !from || !to) { toast('Fill in all fields', 'err'); return; }
    RFIS.unshift({id:'RFI-00'+(RFIS.length+1), sub:sub, from:from, to:to, pri:pri, s:'Open', date:new Date().toLocaleDateString('en-CA'), due:due, resp:''});
    SHOW_RFI_FORM = false; render(); toast('RFI submitted!');
  };

  // Client portal
  el = gid('addClientBtn'); if (el) el.onclick = function() {
    var n = prompt('Client company name:');
    var pr = prompt('Project name:');
    var em = prompt('Client email:');
    if (n && pr && em) { CLIENTS.push({id:Date.now(),n:n,email:em,proj:pr,budget:0,spent:0,pct:0,s:'Active',upd:new Date().toLocaleDateString()}); render(); toast('Client added!'); }
  };
  el = gid('sendClientMsg'); if (el) el.onclick = function() {
    var inp = gid('clientMsgIn');
    var msg = inp ? inp.value.trim() : '';
    if (!msg) return;
    CLIENT_MSGS.push({id:Date.now(), cid:CLIENT_ID, from:'You', msg:msg, date:new Date().toLocaleDateString(), read:true});
    if (inp) inp.value = '';
    render(); toast('Message sent!');
  };

  // Settings
  el = gid('saveSettings'); if (el) el.onclick = function() {
    var n = gid('settName') ? gid('settName').value : '';
    if (n && U) {
      U.name = n;
      ls_set('user', U);
      var users = ls_get('users', []);
      for (var i = 0; i < users.length; i++) if (users[i].id === U.id) { users[i].name = n; break; }
      ls_set('users', users);
      toast('Settings saved!');
      render();
    }
  };
}

function bindHero() {
  var el;
  el = gid('navIn'); if (el) el.onclick = function() { AUTH_MODE = 'signin'; go('estimator'); };
  el = gid('navUp'); if (el) el.onclick = function() { AUTH_MODE = 'signup'; go('estimator'); };
  el = gid('heroStart'); if (el) el.onclick = function() { AUTH_MODE = 'signup'; go('estimator'); };

  var el2 = gid('modalBg'); if (el2) el2.onclick = function(e) { if (e.target === el2) { MODAL = false; render(); } };
  var el3 = gid('closeModal'); if (el3) el3.onclick = function() { MODAL = false; render(); };
}

function bindModal() {
  var el = gid('modalBg'); if (el) el.onclick = function(e) { if (e.target === el) { MODAL = false; render(); } };
  var el2 = gid('closeModal'); if (el2) el2.onclick = function() { MODAL = false; render(); };
}

function bindAuth() {
  var el;
  el = gid('tabSU'); if (el) el.onclick = function() { AUTH_MODE = 'signup'; AUTH_ERR = ''; render(); };
  el = gid('tabSI'); if (el) el.onclick = function() { AUTH_MODE = 'signin'; AUTH_ERR = ''; render(); };
  el = gid('aBtn'); if (el) el.onclick = function() {
    var email = gid('aEmail') ? gid('aEmail').value.trim() : '';
    var pw = gid('aPw') ? gid('aPw').value : '';
    var name = gid('aName') ? gid('aName').value.trim() : '';
    var ok = AUTH_MODE === 'signup' ? doSignup(email, pw, name) : doSignin(email, pw);
    render();
  };
  el = gid('aBack'); if (el) el.onclick = function() { PAGE = 'home'; AUTH_ERR = ''; render(); };
}

// ── START ─────────────────────────────────────────────────────────────────────
try {
  initApp();
  render();
} catch(e) {
  document.getElementById('app').innerHTML = '<div style="padding:40px;font-family:sans-serif"><h2 style="color:red">Error loading app</h2><p>' + e.message + '</p><pre style="background:#f0f0f0;padding:12px;border-radius:8px;font-size:11px;overflow:auto">' + e.stack + '</pre></div>';
}
</script>
