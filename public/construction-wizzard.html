<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Construction Wizzard — AI-Powered Construction Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<script src="https://js.stripe.com/v3/"></script>
<style>
:root{
  --ink:#0c0c0c;--ink2:#181818;--ink3:#252525;
  --gold:#d48a00;--gold2:#f0b800;--gold-bg:#fdf5e0;
  --slate:#f0ede8;--white:#fff;--paper:#faf9f7;
  --border:#e0ddd6;--border2:#ccc9c0;
  --text:#1c1c1c;--muted:#6a6560;--faint:#a8a39a;
  --green:#1a7040;--gbg:#e8f5ee;--gbd:#b8dfc8;
  --red:#a82020;--rbg:#fcecea;--rbd:#f0bdb5;
  --blue:#1848a8;--bbg:#e8effe;--bbd:#b8cef0;
  --amber:#b05800;--abg:#fef0e0;--abd:#f0d090;
  --r:10px;--rlg:16px;
  --fh:'Syne',sans-serif;--fb:'Instrument Sans',sans-serif;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.06);
  --shlg:0 8px 32px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--fb);background:var(--slate);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:var(--fb)}
button{cursor:pointer}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:99px}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;position:relative}
#topbar{height:52px;background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;border-bottom:1px solid #2a2a2a;z-index:200}
.tlogo{background:none;border:none;color:#fff;font-family:var(--fh);font-size:15px;font-weight:800;letter-spacing:.03em;display:flex;align-items:center;gap:8px}
.tlogo .badge{background:var(--gold2);color:var(--ink);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:800}
.tright{display:flex;align-items:center;gap:6px}
.tpill{background:#2a2a2a;color:#aaa;border:none;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer}
.tpill:hover{background:#383838;color:#fff}
.tpro{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);border:none;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:800;letter-spacing:.05em}
.tupgrade{background:var(--gold2);color:var(--ink);border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:700}
.ttrial{background:#1a7040;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700}
.tuser{display:flex;align-items:center;gap:7px;color:#ccc;font-size:12px}
.tavatar{width:28px;height:28px;border-radius:50%;background:var(--gold2);color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}

/* BODY */
#body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:210px;background:var(--ink2);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;padding-bottom:20px}
.ssec{padding:16px 14px 4px;font-size:9px;font-weight:700;letter-spacing:.14em;color:#444;text-transform:uppercase}
.si{display:flex;align-items:center;gap:8px;padding:8px 10px;margin:1px 6px;border-radius:7px;color:#777;font-size:12.5px;cursor:pointer;border:none;background:none;width:calc(100% - 12px);text-align:left;font-family:var(--fb);transition:all .12s}
.si:hover{background:#252525;color:#ccc}
.si.active{background:var(--ink3);color:#fff}
.si .ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sipro{margin-left:auto;background:#2a1800;color:var(--gold2);font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px}
.sb-user{margin:auto 8px 8px;background:#1f1f1f;border-radius:9px;padding:12px;border:1px solid #2a2a2a}
.sb-user-name{font-size:12px;font-weight:600;color:#ddd;margin-bottom:2px}
.sb-user-plan{font-size:10px;color:var(--gold2);font-weight:700;letter-spacing:.04em}
.sb-logout{margin-top:8px;width:100%;padding:6px;background:transparent;border:1px solid #333;color:#666;border-radius:6px;font-size:11px;cursor:pointer}
.sb-logout:hover{border-color:#555;color:#aaa}

/* MAIN */
#main{flex:1;overflow-y:auto;background:var(--slate)}
.page{padding:24px;max-width:1180px;margin:0 auto;animation:pi .18s ease}
@keyframes pi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* PAGE HEADER */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.phl{display:flex;align-items:center;gap:12px}
.phico{width:46px;height:46px;background:var(--white);border:1px solid var(--border);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:var(--sh)}
.phtitle{font-family:var(--fh);font-size:19px;font-weight:800;color:var(--ink)}
.phsub{font-size:12px;color:var(--muted);margin-top:1px}

/* CARDS */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--rlg);padding:20px;box-shadow:var(--sh)}
.ch{font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:18px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}

/* STAT CARDS */
.sc{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh)}
.sv{font-size:22px;font-weight:800;font-family:var(--fh);color:var(--ink)}
.sl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.sdelta{font-size:10px;margin-top:4px;font-weight:600}

/* FORMS */
.field{margin-bottom:13px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.inp{display:block;width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--border2);font-size:13px;background:var(--white);color:var(--text);outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--gold)}
textarea.inp{resize:vertical;min-height:76px}
.r2{display:flex;gap:11px}
.r2 .field{flex:1}
.btn{padding:9px 18px;border-radius:8px;font-weight:700;font-size:13px;border:none;cursor:pointer;transition:opacity .15s;font-family:var(--fb)}
.btn:hover{opacity:.87}
.bink{background:var(--ink);color:#fff}
.bgold{background:var(--gold2);color:var(--ink)}
.bout{background:transparent;border:1px solid var(--border2);color:var(--text)}
.bred{background:var(--rbg);color:var(--red);border:1px solid var(--rbd)}
.bgreen{background:var(--gbg);color:var(--green);border:1px solid var(--gbd)}
.bfull{width:100%;padding:12px}
.bsm{padding:5px 11px;font-size:11.5px}
.bxl{padding:14px 32px;font-size:15px;border-radius:9px}

/* PILLS */
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap}
.pg{background:var(--gbg);color:var(--green)}
.pr{background:var(--rbg);color:var(--red)}
.pa{background:var(--abg);color:var(--amber)}
.pb{background:var(--bbg);color:var(--blue)}
.pgr{background:#f0ede8;color:var(--muted)}
.ppro{background:#1a1200;color:var(--gold2)}
.ptrial{background:#0a2a1a;color:#4ade80}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:7px 10px;font-size:9.5px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)}
.tbl td{padding:10px 10px;border-bottom:.5px solid var(--border);color:var(--text);vertical-align:middle}
.tbl tr:last-child td{border:none}
.tbl tr:hover td{background:#faf8f4}

/* MISC */
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.pbar{height:5px;background:#eae7e0;border-radius:99px;overflow:hidden}
.pfill{height:100%;border-radius:99px;transition:width .4s}
.locked{background:var(--paper);border:1.5px dashed var(--border2);border-radius:var(--r);padding:44px 24px;text-align:center}
.chkrow{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:.5px solid var(--border);cursor:pointer}
.chkrow:last-child{border:none}
.chkrow input{accent-color:var(--gold);width:14px;height:14px;flex-shrink:0;margin-top:2px}
.banner{background:var(--gold-bg);border:1px solid var(--abd);border-radius:9px;padding:10px 15px;font-size:12px;color:var(--amber);display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.trial-banner{background:linear-gradient(135deg,#0a2a1a,#0f3d28);border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.trial-banner .tb-text{color:#4ade80;font-size:13px;font-weight:600}
.trial-banner .tb-sub{color:#86efac;font-size:11px;margin-top:2px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;box-shadow:var(--shlg);animation:toastIn .3s ease;pointer-events:none}
.toast.success{background:#1a7040}
.toast.error{background:#a82020}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.modal-box{background:var(--white);border-radius:var(--rlg);padding:28px;width:100%;max-width:480px;box-shadow:var(--shlg);max-height:92vh;overflow-y:auto}
.modal-box h3{font-family:var(--fh);font-size:19px;margin-bottom:5px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px}

/* AUTH */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--ink);background-image:radial-gradient(circle,#ffffff07 1px,transparent 1px);background-size:22px 22px}
.auth-card{background:var(--white);border-radius:var(--rlg);padding:36px;width:100%;max-width:420px;box-shadow:var(--shlg)}
.auth-logo{font-family:var(--fh);font-size:20px;font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.auth-logo .badge{background:var(--gold2);color:var(--ink);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:800}
.atabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}
.atab{padding:9px;border:1px solid var(--border2);border-radius:7px;background:var(--white);font-size:13px;font-weight:600;color:var(--muted)}
.atab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.auth-err{background:var(--rbg);border:1px solid var(--rbd);border-radius:7px;padding:9px 12px;font-size:12px;color:var(--red);margin-bottom:12px}
.auth-social{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.social-btn{padding:9px;border:1px solid var(--border2);border-radius:7px;background:var(--white);font-size:12.5px;font-weight:600;color:var(--text);display:flex;align-items:center;justify-content:center;gap:7px}
.social-btn:hover{background:var(--slate)}
.or-divider{display:flex;align-items:center;gap:10px;margin:14px 0;font-size:11px;color:var(--faint)}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* HERO */
.hero{background:var(--ink);padding:64px 28px 72px;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background-image:radial-gradient(circle,#ffffff08 1px,transparent 1px);background-size:24px 24px}
.hero-inner{max-width:720px;margin:0 auto;position:relative;z-index:1}
.hero-eye{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold2);margin-bottom:14px}
.hero h1{font-family:var(--fh);font-size:48px;font-weight:800;color:#fff;line-height:1.08;margin-bottom:16px}
.hero h1 em{color:var(--gold2);font-style:normal}
.hero-sub{font-size:15px;color:#999;line-height:1.7;max-width:520px;margin-bottom:28px}
.hero-trial{background:rgba(240,184,0,.12);border:1px solid rgba(240,184,0,.3);border-radius:9px;padding:12px 18px;display:inline-flex;align-items:center;gap:10px;margin-bottom:24px;font-size:13px;color:var(--gold2)}
.hero-ctas{display:flex;gap:10px;flex-wrap:wrap}
.hero-cta{background:var(--gold2);color:var(--ink);border:none;border-radius:9px;padding:13px 26px;font-weight:700;font-size:14px}
.hero-sec{background:transparent;color:#ddd;border:1px solid #444;border-radius:9px;padding:13px 22px;font-weight:500;font-size:14px}

/* PRICING */
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;margin-top:20px}
.pricing-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rlg);padding:26px;position:relative;transition:transform .15s,box-shadow .15s}
.pricing-card:hover{transform:translateY(-2px);box-shadow:var(--shlg)}
.pricing-card.featured{border-color:var(--gold2);border-width:2px;background:linear-gradient(135deg,#fffdf0,#fff)}
.pricing-badge{position:absolute;top:-1px;right:20px;background:var(--gold2);color:var(--ink);font-size:10px;font-weight:800;padding:3px 10px;border-radius:0 0 7px 7px;letter-spacing:.05em}
.pricing-name{font-family:var(--fh);font-size:16px;font-weight:800;margin-bottom:6px}
.pricing-price{font-family:var(--fh);font-size:32px;font-weight:800;color:var(--ink);line-height:1}
.pricing-price span{font-size:14px;font-weight:500;color:var(--muted)}
.pricing-range{font-size:11px;color:var(--muted);margin-top:3px;margin-bottom:16px}
.pricing-feature{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;color:var(--muted);padding:5px 0;border-bottom:.5px solid var(--border)}
.pricing-feature:last-child{border:none}
.pricing-feature::before{content:'✓';color:var(--green);font-weight:700;flex-shrink:0}

/* HOME TOOLS */
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.tc{background:var(--white);border:1px solid var(--border);border-radius:var(--rlg);padding:18px;cursor:pointer;transition:transform .15s,box-shadow .15s;text-align:left}
.tc:hover{transform:translateY(-2px);box-shadow:var(--shlg)}
.tc-title{font-family:var(--fh);font-size:14px;font-weight:700;margin:8px 0 4px;color:var(--ink)}
.tc-desc{font-size:11.5px;color:var(--muted);line-height:1.55}
.tc-arrow{margin-top:11px;font-size:11px;font-weight:700;color:var(--blue)}

/* SAVE/LOAD */
.project-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:box-shadow .15s;display:flex;justify-content:space-between;align-items:center}
.project-card:hover{box-shadow:var(--sh)}
.project-card-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px}
.project-card-meta{font-size:11px;color:var(--muted)}
.project-actions{display:flex;gap:6px}

/* STATS STRIP */
.sstrip{background:var(--ink);padding:28px;display:flex;justify-content:center;gap:52px;flex-wrap:wrap}

/* GANTT */
.gantt-label{width:140px;font-size:11px;color:var(--muted);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gantt-track{flex:1;height:22px;background:#eae7e0;border-radius:5px;position:relative;overflow:hidden}
.gantt-bar{position:absolute;height:100%;border-radius:5px;display:flex;align-items:center;padding-left:7px;font-size:10px;font-weight:700;color:#fff}

/* AI CHAT */
.ai-bubble{background:var(--white);border:1px solid var(--border);border-radius:11px;padding:11px 13px;font-size:13px;line-height:1.6;max-width:82%}
.ai-bubble.user{background:var(--ink);color:#fff;border-color:var(--ink)}
.ai-avatar{width:28px;height:28px;border-radius:50%;background:var(--gold2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}

/* MOBILE RESPONSIVE */
@media(max-width:768px){
  #sidebar{display:none}
  .page{padding:16px}
  .hero h1{font-size:32px}
  .pricing-grid{grid-template-columns:1fr}
  .g2,.g4{grid-template-columns:1fr}
}
</style>

// LOCAL STORAGE (simulates real database)
// ═══════════════════════════════════════════════════════
function saveToStorage(key, data){
  try{ localStorage.setItem('cw_'+key, JSON.stringify(data)); }catch(e){}
}
function loadFromStorage(key, fallback=null){
  try{ const d=localStorage.getItem('cw_'+key); return d?JSON.parse(d):fallback; }catch(e){ return fallback; }
}

function loadUserData(){
  const user = loadFromStorage('user');
  if(user){
    // Check trial expiry
    if(user.plan==='free_trial' && user.trialEnds){
      const days = Math.ceil((new Date(user.trialEnds)-new Date())/(1000*60*60*24));
      user.trialDaysLeft = Math.max(0,days);
      if(days<=0) user.plan='expired';
    }
    APP.user = user;
  }
  APP.savedProjects = loadFromStorage('projects', []);
  APP.bids = loadFromStorage('bids', APP.bids);
}

function saveUser(){
  saveToStorage('user', APP.user);
}
function saveProjects(){
  saveToStorage('projects', APP.savedProjects);
}
function saveBids(){
  saveToStorage('bids', APP.bids);
}

// ═══════════════════════════════════════════════════════
// AUTH (Real with localStorage persistence)
// ═══════════════════════════════════════════════════════
function handleSignup(email, password, name){
  if(!email||!password||!name){ APP.authError='Please fill in all fields.'; return false; }
  if(password.length<6){ APP.authError='Password must be at least 6 characters.'; return false; }

  // Check if user exists
  const users = loadFromStorage('users', []);
  if(users.find(u=>u.email===email)){ APP.authError='An account with this email already exists.'; return false; }

  // Create trial end date (7 days from now)
  const trialEnds = new Date();
  trialEnds.setDate(trialEnds.getDate()+7);

  const user = {
    id: 'u_'+Date.now(),
    email, name,
    plan: 'free_trial',
    trialEnds: trialEnds.toISOString(),
    trialDaysLeft: 7,
    createdAt: new Date().toISOString(),
  };

  users.push({...user, password}); // In real app: hash password
  saveToStorage('users', users);
  APP.user = user;
  saveUser();
  APP.authError = '';
  return true;
}

function handleSignin(email, password){
  if(!email||!password){ APP.authError='Please enter your email and password.'; return false; }
  const users = loadFromStorage('users', []);
  const user = users.find(u=>u.email===email && u.password===password);
  if(!user){ APP.authError='Incorrect email or password.'; return false; }

  // Recalculate trial days
  if(user.plan==='free_trial' && user.trialEnds){
    const days = Math.ceil((new Date(user.trialEnds)-new Date())/(1000*60*60*24));
    user.trialDaysLeft = Math.max(0, days);
    if(days<=0) user.plan='expired';
  }

  APP.user = user;
  saveUser();
  APP.authError = '';
  return true;
}

function handleSignout(){
  APP.user = null;
  APP.page = 'home';
  render();
}

function processPlanUpgrade(plan){
  // In production: call your backend /api/create-checkout-session
  // Then redirect to Stripe Checkout
  // For now: simulate successful payment + update plan
  const users = loadFromStorage('users', []);
  const idx = users.findIndex(u=>u.id===APP.user.id);
  if(idx>-1){
    users[idx].plan = plan;
    users[idx].trialEnds = null;
    saveToStorage('users', users);
  }
  APP.user.plan = plan;
  APP.user.trialEnds = null;
  saveUser();
  APP.showModal = false;
  showToast(`🎉 Welcome to ${APP.plans[plan]?.name||plan}! All features unlocked.`,'success');
  render();
}

function saveEstimate(){
  calcEst();
  const project = {
    id: 'proj_'+Date.now(),
    name: APP.est.pn,
    client: APP.est.cn,
    trade: TRADES[APP.est.trade]?.l||APP.est.trade,
    total: APP.estRes.t,
    currency: APP.est.currency,
    date: new Date().toLocaleDateString(),
    data: {...APP.est},
    result: {...APP.estRes},
  };
  APP.savedProjects.unshift(project);
  saveProjects();
  showToast('✓ Estimate saved to projects!','success');
  render();
}

function loadEstimate(id){
  const proj = APP.savedProjects.find(p=>p.id===id);
  if(!proj) return;
  APP.est = {...proj.data};
  APP.estRes = {...proj.result};
  APP.activeProjectId = id;
  APP.page = 'estimator';
  showToast('✓ Estimate loaded!','success');
  render();
}

function deleteProject(id){
  APP.savedProjects = APP.savedProjects.filter(p=>p.id!==id);
  saveProjects();
  showToast('Project deleted.','error');
  render();
}

// BIND ALL EVENTS
// ═══════════════════════════════════════════════════════
function bindAll(){
  const gid = id => document.getElementById(id);
  const openModal = (type='plans') => { APP.showModal=true; APP.modalType=type; render(); };

  // Topbar
  gid('topUpgrade')?.addEventListener('click',()=>openModal('plans'));
  gid('topSignout')?.addEventListener('click',handleSignout);

  // Upgrade buttons
  ['gateBtn','banBtn','trialUpgradeBtn','lkPdf','lkExport','upgBasic','upgPro'].forEach(id=>{
    gid(id)?.addEventListener('click',()=>{
      const isBasic = id==='upgBasic';
      APP.selectedPlan = isBasic?'basic':'pro';
      openModal('payment');
    });
  });
  ['upgBasic2','choosBasic'].forEach(id=>gid(id)?.addEventListener('click',()=>{APP.selectedPlan='basic';openModal('payment');}));
  ['upgPro2','choosPro'].forEach(id=>gid(id)?.addEventListener('click',()=>{APP.selectedPlan='pro';openModal('payment');}));

  // Modal
  gid('modalBg')?.addEventListener('click',e=>{if(e.target===gid('modalBg')){APP.showModal=false;render();}});
  gid('closeModal')?.addEventListener('click',()=>{APP.showModal=false;render();});
  // Payment handled by Stripe payment links - no card input needed

  // Estimator
  gid('calcBtn')?.addEventListener('click',()=>{
    ['pn','cn'].forEach(k=>{const el=gid('e'+k);if(el)APP.est[k]=el.value;});
    const flds={cur:'currency',tr:'trade',sf:'sqft',csf:'csf',mat:'mat',lab:'lab',oh:'oh',pr:'pr'};
    Object.entries(flds).forEach(([id,key])=>{const el=gid('e'+id);if(el){const v=el.value;APP.est[key]=isNaN(+v)||key==='currency'||key==='trade'?v:+v;}});
    calcEst(); render();
  });
  ['saveEstBtn','saveEstBtn2'].forEach(id=>gid(id)?.addEventListener('click',saveEstimate));

  // Bids
  gid('toggleBF')?.addEventListener('click',()=>{APP.showBF=!APP.showBF;render();});
  gid('addBidBtn')?.addEventListener('click',()=>{
    const p=gid('nbp')?.value,c=gid('nbc')?.value,v=gid('nbv')?.value,t=gid('nbt')?.value;
    if(!p||!c||!v){showToast('Please fill all fields','error');return;}
    APP.bids.unshift({id:Date.now(),p,c,v:+v,s:'Pending',t,date:new Date().toLocaleDateString()});
    saveBids(); APP.showBF=false; render();
    showToast('Bid added!','success');
  });

  // Daily Log
  gid('showLF')?.addEventListener('click',()=>{APP.showLF=!APP.showLF;render();});
  gid('submitLog')?.addEventListener('click',()=>{
    const d=gid('ld')?.value; if(!d){showToast('Please select a date','error');return;}
    APP.logs.unshift({id:Date.now(),date:d,weather:gid('lw')?.value||'Clear',crew:+(gid('lc')?.value||0),notes:gid('ln')?.value||'No notes.',photos:0});
    APP.showLF=false; render(); showToast('Daily log saved!','success');
  });

  // Safety
  document.querySelectorAll('[data-sc]').forEach(el=>el.addEventListener('change',e=>{APP.safetyChecked[el.dataset.sc]=e.target.checked;render();}));
  gid('safetyNote')?.addEventListener('input',e=>APP.safetyNote=e.target.value);
  gid('safetySubmit')?.addEventListener('click',()=>{
    if(Object.values(APP.safetyChecked).filter(Boolean).length<SAFETY_ITEMS.length){showToast(`Complete all ${SAFETY_ITEMS.length} items first`,'error');return;}
    APP.safetyDone=true; render(); showToast('Safety report submitted!','success');
  });

  // Meetings
  document.querySelectorAll('[data-mc]').forEach(el=>el.addEventListener('change',e=>{APP.mc[el.dataset.mc]=e.target.checked;render();}));
  gid('meetingSignOff')?.addEventListener('click',()=>{APP.mdone=true;render();showToast('Meeting recorded!','success');});

  // Compliance
  document.querySelectorAll('[data-cc]').forEach(el=>el.addEventListener('change',e=>{APP.compc[el.dataset.cc]=e.target.checked;render();}));
  gid('compSave')?.addEventListener('click',()=>showToast('Compliance record saved!','success'));

  // Settings
  gid('saveSettings')?.addEventListener('click',()=>{
    const name = gid('settName')?.value;
    if(name && APP.user){
      APP.user.name=name;
      saveUser();
      const users = loadFromStorage('users',[]);
      const idx = users.findIndex(u=>u.id===APP.user.id);
      if(idx>-1){users[idx].name=name;saveToStorage('users',users);}
      showToast('Settings saved!','success');
      render();
    }
  });

  // AI
  gid('aiSend')?.addEventListener('click',sendAI);
  gid('aiInput')?.addEventListener('keydown',e=>{if(e.key==='Enter')sendAI();});
  document.querySelectorAll('[data-aip]').forEach(el=>el.addEventListener('click',()=>{
    const inp=gid('aiInput'); if(inp)inp.value=el.dataset.aip;
  }));

  // Card formatting handled by Stripe checkout page
}

  gid('heroStart')?.addEventListener('click',()=>{APP.authMode='signup';go('estimator');});

function bindPricing(){
  const gid = id => document.getElementById(id);
  gid('navSignin2')?.addEventListener('click',()=>{APP.authMode='signin';go('estimator');});
  gid('navSignup2')?.addEventListener('click',()=>{APP.authMode='signup';go('estimator');});
  gid('startTrial')?.addEventListener('click',()=>{APP.authMode='signup';go('estimator');});
  gid('buyBasic')?.addEventListener('click',()=>{APP.selectedPlan='basic';if(!APP.user){APP.authMode='signup';go('estimator');}else{APP.showModal=true;APP.modalType='payment';render();}});
  gid('buyPro')?.addEventListener('click',()=>{APP.selectedPlan='pro';if(!APP.user){APP.authMode='signup';go('estimator');}else{APP.showModal=true;APP.modalType='payment';render();}});

function bindModal(){
  const gid = id => document.getElementById(id);
  gid('modalBg')?.addEventListener('click',e=>{if(e.target===gid('modalBg')){APP.showModal=false;render();}});
  gid('closeModal')?.addEventListener('click',()=>{APP.showModal=false;render();});
}

function bindAuth(){
  const gid = id => document.getElementById(id);
  gid('tabSU')?.addEventListener('click',()=>{APP.authMode='signup';APP.authError='';render();});
  gid('tabSI')?.addEventListener('click',()=>{APP.authMode='signin';APP.authError='';render();});
  gid('switchToSignup')?.addEventListener('click',()=>{APP.authMode='signup';APP.authError='';render();});
  gid('aEmail')?.addEventListener('input',e=>APP.email=e.target.value);
  gid('aPw')?.addEventListener('input',e=>APP.pw=e.target.value);
  gid('aBtn')?.addEventListener('click',()=>{
    const email=gid('aEmail')?.value?.trim();
    const pw=gid('aPw')?.value;
    const name=gid('aName')?.value?.trim();
    let ok;
    if(APP.authMode==='signup') ok=handleSignup(email,pw,name);
    else ok=handleSignin(email,pw);
    if(ok){ APP.email=''; APP.pw=''; render(); }
    else render();
  });
  gid('aBack')?.addEventListener('click',()=>{APP.page='home';APP.authError='';render();});
}

// AI responses
const AI_RESP={
  status:'Project is 48% complete. Structural steel is 5 days behind — pushing electrical and drywall. Budget tracking within 3%. 2 open incidents need resolution.',
  budget:'Cost code 3000 (Structural Steel) is at 91% of budget with significant work remaining — high overrun risk. Plumbing (5000) is tracking well. Recommend steel sub review this week.',
  task:'Generated task list for plumbing renovation: 1) Site assessment & rough-in planning 2) Demo & pipe removal 3) New rough-in installation 4) Pressure testing 5) Fixtures & finishes 6) Final inspection.',
  safety:'Top risks: (1) Crane exclusion zone needs stricter enforcement. (2) Confined space entry crew 40% certified. (3) Two open incidents unresolved. Plumbing trenches need guarding.',
  delay:'Steel 5 days late. Cascade: Electrical +5 days, Drywall +7 days, Finishes +10 days. Completion shifts Aug 15 → Aug 25.',
  carbon:'Embodied carbon at 154.2 tCO₂e vs 152 target — slightly over. Structural steel (70.1 tCO₂e) is largest contributor. Consider lower-carbon steel grades for future projects.',
};

function sendAI(){
  const input=document.getElementById('aiInput')?.value?.trim();
  if(!input)return;
  APP.aiMsgs.push({r:'user',t:input});APP.aiInput='';APP.aiLoading=true;render();
  setTimeout(()=>{
    const key=Object.keys(AI_RESP).find(k=>input.toLowerCase().includes(k));
    APP.aiMsgs.push({r:'ai',t:key?AI_RESP[key]:'I\'ve reviewed your project. Three key watch areas: structural steel schedule, budget overrun risk on code 3000, and two open safety incidents. Want me to go deeper on any of these?'});
    APP.aiLoading=false;render();
    setTimeout(()=>{const w=document.getElementById('aiWrap');if(w)w.scrollTop=w.scrollHeight;},50);
  },1100);
}
