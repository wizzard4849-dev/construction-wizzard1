const g = id => document.getElementById(id);
const money = (v,c='USD') => new Intl.NumberFormat(c==='CAD'?'en-CA':'en-US',{style:'currency',currency:c,maximumFractionDigits:0}).format(v);

function pill(s){
  var cls='pgr';
  if(s==='Approved'||s==='Complete'||s==='Paid'||s==='Closed'||s==='Mitigated'||s==='Low'||s==='On Track') cls='pg';
  else if(s==='Rejected'||s==='Overdue'||s==='Active'||s==='High') cls='pr';
  else if(s==='Pending'||s==='Open'||s==='Medium'||s==='Med') cls='pa';
  return '<span class="pill '+cls+'">'+s+'</span>';
}

function ph2(ico,title,sub,act=''){
  return `<div class="ph"><div class="phl"><div class="phico">${ico}</div><div><div class="phtitle">${title}</div><div class="phsub">${sub}</div></div></div><div>${act}</div></div>`;
}

function srow(l,v){return `<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:9px"><span style="color:var(--muted)">${l}</span><strong>${v}</strong></div>`}

function calcEst(){
  const e=APP.est,b=e.sqft*e.csf,d=b+e.mat+e.lab,o=d*(e.oh/100),p=(d+o)*(e.pr/100);
  APP.estRes={b,d,o,p,t:d+o+p};
}

function isPro(){return APP.user&&(APP.user.plan==='basic'||APP.user.plan==='pro');}
function isTrial(){return APP.user&&APP.user.plan==='free_trial'&&APP.user.trialDaysLeft>0;}
function hasAccess(){return isPro()||isTrial();}

function proGate(fn){
  if(!hasAccess()) return '<div class="locked"><div style="font-size:34px;margin-bottom:10px">🔒</div><div style="font-family:var(--fh);font-size:18px;font-weight:800;margin-bottom:6px">Pro Feature</div><p style="color:var(--muted);margin-bottom:18px;max-width:320px;margin-left:auto;margin-right:auto">Upgrade to unlock this module and all Pro features.</p><button class="btn bgold" id="gateBtn">Upgrade to Pro →</button></div>';
  return fn();
}

function trialBanner(){
  if(!APP.user) return '';
  if(isTrial()) return '<div class="trial-banner"><div><div class="tb-text">Free Trial Active - '+(APP.user.trialDaysLeft||0)+' days remaining</div><div class="tb-sub">Upgrade before your trial ends to keep all features.</div></div><button class="btn bgold bsm" id="trialUpgradeBtn">Upgrade Now</button></div>';
  if(!isPro()) return '<div class="banner"><span>You are on the Free plan. Upgrade to unlock all Pro features.</span><button class="btn bgold bsm" id="banBtn">View Plans</button></div>';
  return '';
}

function showToast(msg, type='success'){
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

// LOCAL STORAGE (simulates real database)
// ═══════════════════════════════════════════════════════
function saveToStorage(key, data){
  try{ localStorage.setItem('cw_'+key, JSON.stringify(data)); }catch(e){}
}
function loadFromStorage(key, fallback=null){
  try{ const d=localStorage.getItem('cw_'+key); return d?JSON.parse(d):fallback; }catch(e){ return fallback; }
}

function loadUserData(){
  const user = loadFromStorage('user');
  if(user){
    // Check trial expiry
    if(user.plan==='free_trial' && user.trialEnds){
      const days = Math.ceil((new Date(user.trialEnds)-new Date())/(1000*60*60*24));
      user.trialDaysLeft = Math.max(0,days);
      if(days<=0) user.plan='expired';
    }
    APP.user = user;
  }
  APP.savedProjects = loadFromStorage('projects', []);
  APP.bids = loadFromStorage('bids', APP.bids);
}

function saveUser(){
  saveToStorage('user', APP.user);
}
function saveProjects(){
  saveToStorage('projects', APP.savedProjects);
}
function saveBids(){
  saveToStorage('bids', APP.bids);
}

function handleSignup(email, password, name){
  if(!email||!password||!name){ APP.authError='Please fill in all fields.'; return false; }
  if(password.length<6){ APP.authError='Password must be at least 6 characters.'; return false; }

  // Check if user exists
  const users = loadFromStorage('users', []);
  if(users.find(u=>u.email===email)){ APP.authError='An account with this email already exists.'; return false; }

  // Create trial end date (7 days from now)
  const trialEnds = new Date();
  trialEnds.setDate(trialEnds.getDate()+7);

  const user = {
    id: 'u_'+Date.now(),
    email, name,
    plan: 'free_trial',
    trialEnds: trialEnds.toISOString(),
    trialDaysLeft: 7,
    createdAt: new Date().toISOString(),
  };

  users.push({...user, password}); // In real app: hash password
  saveToStorage('users', users);
  APP.user = user;
  saveUser();
  APP.authError = '';
  
  // Notify you of new signup via Supabase + Email
  onNewSignup(user);
  
  return true;
}

function handleSignin(email, password){
  if(!email||!password){ APP.authError='Please enter your email and password.'; return false; }
  const users = loadFromStorage('users', []);
  const user = users.find(u=>u.email===email && u.password===password);
  if(!user){ APP.authError='Incorrect email or password.'; return false; }

  // Recalculate trial days
  if(user.plan==='free_trial' && user.trialEnds){
    const days = Math.ceil((new Date(user.trialEnds)-new Date())/(1000*60*60*24));
    user.trialDaysLeft = Math.max(0, days);
    if(days<=0) user.plan='expired';
  }

  APP.user = user;
  saveUser();
  APP.authError = '';
  return true;
}

function handleSignout(){
  APP.user = null;
  APP.page = 'home';
  render();
}

// PAYMENTS (Stripe-ready frontend)
// ═══════════════════════════════════════════════════════
function processPlanUpgrade(plan){
  const users = loadFromStorage('users', []);
  const idx = users.findIndex(u=>u.id===APP.user.id);
  if(idx>-1){
    users[idx].plan = plan;
    users[idx].trialEnds = null;
    saveToStorage('users', users);
  }
  APP.user.plan = plan;
  APP.user.trialEnds = null;
  saveUser();
  APP.showModal = false;
  showToast(`🎉 Welcome to ${APP.plans[plan]?.name||plan}! All features unlocked.`,'success');
  render();
}

// SAVE / LOAD ESTIMATES
// ═══════════════════════════════════════════════════════
function saveEstimate(){
  calcEst();
  const project = {
    id: 'proj_'+Date.now(),
    name: APP.est.pn,
    client: APP.est.cn,
    trade: TRADES[APP.est.trade]?.l||APP.est.trade,
    total: APP.estRes.t,
    currency: APP.est.currency,
    date: new Date().toLocaleDateString(),
    data: {...APP.est},
    result: {...APP.estRes},
  };
  APP.savedProjects.unshift(project);
  saveProjects();
  showToast('✓ Estimate saved to projects!','success');
  render();
}

function loadEstimate(id){
  const proj = APP.savedProjects.find(p=>p.id===id);
  if(!proj) return;
  APP.est = {...proj.data};
  APP.estRes = {...proj.result};
  APP.activeProjectId = id;
  APP.page = 'estimator';
  showToast('✓ Estimate loaded!','success');
  render();
}

function deleteProject(id){
  APP.savedProjects = APP.savedProjects.filter(p=>p.id!==id);
  saveProjects();
  showToast('Project deleted.','error');
  render();
}

// ═══════════════════════════════════════════════════════
// MATERIAL PRICE TRACKER
// ═══════════════════════════════════════════════════════
function materialsHTML(){
  const mats = APP.materials.filter(m=>
    APP.materialSearch==='' ||
    m.name.toLowerCase().includes(APP.materialSearch.toLowerCase())
  );
  const up = APP.materials.filter(m=>m.trend==='up').length;
  const down = APP.materials.filter(m=>m.trend==='down').length;

  return ph2('🏗','Material Price Tracker','Live construction material prices — auto-update your estimates when costs change')+`
  <div class="g4" style="margin-bottom:18px">
    <div class="sc"><div class="sv">${APP.materials.length}</div><div class="sl">Materials Tracked</div></div>
    <div class="sc" style="background:var(--rbg)"><div class="sv" style="color:var(--red)">↑ ${up}</div><div class="sl">Prices Rising</div></div>
    <div class="sc" style="background:var(--gbg)"><div class="sv" style="color:var(--green)">↓ ${down}</div><div class="sl">Prices Falling</div></div>
    <div class="sc"><div class="sv">Today</div><div class="sl">Last Updated</div></div>
  </div>

  <div class="card">
    <div class="ch">
      Live Material Prices
      <div style="display:flex;gap:8px;align-items:center">
        <input class="inp" id="matSearch" placeholder="Search materials..." style="width:200px;padding:6px 10px;font-size:12px" value="${APP.materialSearch}"/>
        <button class="btn bink bsm">+ Add Material</button>
      </div>
    </div>

    <table class="tbl">
      <thead><tr><th>Material</th><th>Unit</th><th>Current Price</th><th>Previous</th><th>Change</th><th>Trend</th><th>Supplier</th><th>Updated</th></tr></thead>
      <tbody>
        ${mats.map(m=>{
          const change = m.price - m.prev;
          const changePct = ((change/m.prev)*100).toFixed(1);
          const trendColor = m.trend==='up'?'var(--red)':m.trend==='down'?'var(--green)':'var(--muted)';
          const trendIcon = m.trend==='up'?'↑':m.trend==='down'?'↓':'→';
          return `<tr>
            <td><strong>${m.name}</strong></td>
            <td style="color:var(--muted)">${m.unit}</td>
            <td><strong style="font-size:14px">$${m.price.toFixed(2)}</strong></td>
            <td style="color:var(--muted)">$${m.prev.toFixed(2)}</td>
            <td style="color:${trendColor};font-weight:700">${change>=0?'+':''}$${Math.abs(change).toFixed(2)}<div style="font-size:9.5px">${change>=0?'+':''}${changePct}%</div></td>
            <td><span style="font-size:18px;color:${trendColor}">${trendIcon}</span></td>
            <td style="color:var(--muted);font-size:12px">${m.supplier}</td>
            <td style="color:var(--faint);font-size:11px">${m.updated}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>

    <div style="margin-top:16px;padding:12px 14px;background:var(--gold-bg);border:1px solid var(--abd);border-radius:9px;font-size:12.5px;color:var(--amber)">
      💡 <strong>Price Alert:</strong> Lumber (+17.9%), Concrete (+7.6%), Structural Steel (+5.1%) and Asphalt (+7.9%) have risen since last month.
      <button class="btn bgold bsm" style="margin-left:10px" id="updateEstimates">Update All Estimates →</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// RFI MANAGEMENT
// ═══════════════════════════════════════════════════════
function rfiHTML(){
  const filters = ['All','Open','Answered','High Priority'];
  const filtered = APP.rfis.filter(r=>{
    if(APP.rfiFilter==='All') return true;
    if(APP.rfiFilter==='Open') return r.status==='Open';
    if(APP.rfiFilter==='Answered') return r.status==='Answered';
    if(APP.rfiFilter==='High Priority') return r.priority==='High';
    return true;
  });
  const open = APP.rfis.filter(r=>r.status==='Open').length;
  const overdue = APP.rfis.filter(r=>r.status==='Open' && new Date(r.due)<new Date()).length;

  return ph2('📝','RFI Management','Track every Request for Information from submission to answer',
    `<button class="btn bink bsm" id="showRFIForm">${APP.showRFIForm?'Cancel':'+ New RFI'}</button>`)+`

    <div class="sc" style="background:var(--gbg)"><div class="sv" style="color:var(--green)">${APP.rfis.filter(r=>r.status==='Answered').length}</div><div class="sl">Answered</div></div>
    <div class="sc" style="background:${overdue>0?'var(--rbg)':'var(--white)'}"><div class="sv" style="color:${overdue>0?'var(--red)':'var(--ink)'}">${overdue}</div><div class="sl">Overdue</div></div>

    <div class="ch">Submit New RFI</div>

      <div class="field"><label>RFI Subject</label><input class="inp" id="rfiSubject" placeholder="e.g. Clarification on ceiling height FL3"/></div>

      <div class="field"><label>Related Drawing</label><input class="inp" placeholder="e.g. A-201 Rev 3"/></div>

    <div class="field"><label>Attach Drawing / Photo</label><input class="inp" type="file" accept="image/*,application/pdf"/></div>
    <button class="btn bink" id="submitRFI">Submit RFI</button>
  </div>`:''}

  <!-- Filter tabs -->
  <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
    ${filters.map(f=>`<button onclick="APP.rfiFilter='${f}';render()" style="padding:6px 14px;border-radius:7px;border:1px solid ${APP.rfiFilter===f?'var(--ink)':'var(--border2)'};background:${APP.rfiFilter===f?'var(--ink)':'transparent'};color:${APP.rfiFilter===f?'#fff':'var(--muted)'};font-size:12px;font-weight:600;cursor:pointer">${f}</button>`).join('')}
  </div>

  <div style="display:flex;flex-direction:column;gap:12px">
    ${filtered.map(r=>`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">

        </div>

function bindAll(){
  const gid = id => document.getElementById(id);
  const openModal = (type='plans') => { APP.showModal=true; APP.modalType=type; render(); };

  // Topbar
  gid('topUpgrade')?.addEventListener('click',()=>openModal('plans'));
  gid('topSignout')?.addEventListener('click',handleSignout);

  // Upgrade buttons
  ['gateBtn','banBtn','trialUpgradeBtn','lkPdf','lkExport','upgBasic','upgPro'].forEach(id=>{
    gid(id)?.addEventListener('click',()=>{
      const isBasic = id==='upgBasic';
      APP.selectedPlan = isBasic?'basic':'pro';
      openModal('payment');
    });
  });
  ['upgBasic2','choosBasic'].forEach(id=>gid(id)?.addEventListener('click',()=>{APP.selectedPlan='basic';openModal('payment');}));
  ['upgPro2','choosPro'].forEach(id=>gid(id)?.addEventListener('click',()=>{APP.selectedPlan='pro';openModal('payment');}));

  // Modal
  gid('modalBg')?.addEventListener('click',e=>{if(e.target===gid('modalBg')){APP.showModal=false;render();}});
  gid('closeModal')?.addEventListener('click',()=>{APP.showModal=false;render();});
  // Payment handled by Stripe payment links - no card input needed

  gid('calcBtn')?.addEventListener('click',()=>{

  ['saveEstBtn','saveEstBtn2'].forEach(id=>gid(id)?.addEventListener('click',saveEstimate));

<!-- PWA Service Worker & Install Logic -->
<script>
// Register Service Worker
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW failed:', err));
  });
}

// PWA Install Prompt
let deferredPrompt;
const banner = document.getElementById('pwaInstallBanner');
const installBtn = document.getElementById('pwaInstallBtn');
const dismissBtn = document.getElementById('pwaDismiss');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  // Show banner after 3 seconds
  setTimeout(() => {
    if(banner) banner.style.display = 'flex';
  }, 3000);
});

if(installBtn) {
  installBtn.addEventListener('click', async () => {
    if(deferredPrompt) {
      deferredPrompt.prompt();
      const {outcome} = await deferredPrompt.userChoice;
      if(outcome === 'accepted') {
        if(banner) banner.style.display = 'none';
      }
      deferredPrompt = null;
    }
  });
}

if(dismissBtn) {
  dismissBtn.addEventListener('click', () => {
    if(banner) banner.style.display = 'none';
  });
}

// iOS detection - show custom message
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
if(isIOS && !isStandalone) {
  setTimeout(() => {
    if(banner) {
      banner.innerHTML = `
        <div style="font-size:24px">⬡</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:13px;margin-bottom:2px">Add to Home Screen</div>
          <div style="font-size:11px;color:#aaa">Tap <strong>Share</strong> then <strong>"Add to Home Screen"</strong> to install</div>
        </div>
        <button id="iosDismiss" style="background:transparent;color:#aaa;border:1px solid #333;border-radius:7px;padding:8px 10px;font-size:12px;cursor:pointer">✕</button>`;
      banner.style.display = 'flex';
      document.getElementById('iosDismiss')?.addEventListener('click', () => banner.style.display = 'none');
    }
  }, 3000);
}
</script>
